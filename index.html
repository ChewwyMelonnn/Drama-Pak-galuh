<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundboard Drama sir galuh</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Soundboard</h1>
            <p class="subtitle">tinggal Click aja to play sound nya</p>
            <p class="subtitle">nanti ini bisa kita custom isi sound nya makek rekaman kita, jadinya tinggal pencet aja saat tampil (bisa Rama yang mencet, soalnya kebanayakan scene nya cuma tampil masuk ke kelas sebentar)</p>
        </header>

        <div class="soundboard">
            <!-- Soundboard buttons will be generated here by JavaScript -->
        </div>

        <div class="player">
            <div class="player-info">
                <div class="track-name">No sound playing</div>
                
                <div class="slider-container">
                    <input type="range" id="timeSlider" class="time-slider" min="0" max="100" value="0">
                    <span class="time">0:00 / 0:00</span>
                </div>
                
                <div class="player-controls">
                    <button id="stopButton" class="control-button stop-button" disabled>
                        <span class="button-icon">🥀</span>
                        <span class="button-text">Stop</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio element untuk playing sound -->
    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
